<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Códigos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }
    .box {
      background: white;
      max-width: 400px;
      margin: auto;
      padding: 20px;
      border-radius: 8px;
    }
    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    #resultado {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Consulta de Código</h2>

  <select id="gestion"></select>

  <button onclick="buscar()">Buscar código</button>

  <div id="resultado"></div>
</div>

<script>
  const API_URL = https://script.google.com/macros/s/AKfycbyqo1annld_K0eSXEjkUgMu5mP3N_izz2UfcUXKOQ3dUFfMBdwbZps6sJTaDMtzHlcz/exec;

  window.onload = () => {
    fetch(API_URL + "?action=gestiones")
      .then(res => res.json())
      .then(data => {
        const select = document.getElementById("gestion");
        data.gestiones.forEach(g => {
          const opt = document.createElement("option");
          opt.value = g;
          opt.textContent = g;
          select.appendChild(opt);
        });
      });
  };

  function buscar() {
    const gestion = document.getElementById("gestion").value;

    fetch(API_URL + "?gestion=" + encodeURIComponent(gestion))
      .then(res => res.json())
      .then(data => {
        document.getElementById("resultado").innerText =
          "Código: " + data.codigo;
      });
  }
</script>

</body>
</html>
